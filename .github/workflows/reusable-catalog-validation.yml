name: "Reusable Catalog Validation"

on:
  workflow_call:
    inputs:
      node_version:
        type: string
        default: "20"

permissions:
  contents: read

jobs:
  catalog:
    name: Catalog validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # maintainers + module version rely on full git history

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ inputs.node_version }}
          cache: npm
          cache-dependency-path: |
            scripts/package-lock.json
            web/package-lock.json

      - name: Install catalog builder dependencies
        working-directory: scripts
        run: npm ci

      - name: Build catalog
        working-directory: scripts
        run: npm run build

      - name: Run parser unit tests
        working-directory: scripts
        run: npm test

      - name: Copy catalog to web public
        run: |
          mkdir -p web/public
          cp catalog.json web/public/catalog.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Run typecheck
        working-directory: web
        run: npm run typecheck

      - name: Build Next.js static export
        working-directory: web
        env:
          NEXT_PUBLIC_BASE_PATH: /tfbox
        run: npm run build
