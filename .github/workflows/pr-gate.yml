name: "🚦 Pull Request Gate and Release"

on:
  pull_request:
    types: [opened, reopened, synchronize, closed] # closed required by releaser
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: pr-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: false # never cancel a merge-triggered release run

jobs:
  validate-terraform:
    name: Terraform validation
    uses: ./.github/workflows/reusable-modules-validation.yml
    with:
      modules: '["dynamodb-table","iam-role","lambda-layer","sqs-queue","sns-topic","lambda-function"]'

  validate-catalog:
    name: Catalog validation
    uses: ./.github/workflows/reusable-catalog-validation.yml

  release:
    name: Release Terraform modules
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - validate-terraform
      - validate-catalog
    # Releaser needs ALL pull_request events (open/sync posts preview comments on the PR,
    # closed+merged cuts the actual release). The action itself gates release-only side effects.
    permissions:
      contents: write       # push tags, create release, push wiki
      pull-requests: write  # comment on PR with release preview
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Run Terraform Module Releaser
        uses: techpivot/terraform-module-releaser@v2
        with:
          semver-mode: keywords
          default-first-tag: v0.0.1
          major-keywords: major change,breaking change
          minor-keywords: feat,feature
          patch-keywords: fix,hotfix,chore,docs,config,ci